<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Clear Board — a free trainer that takes you from first day to job-ready as a CN conductor. Built for the people a rulebook failed.">
<title>Clear Board — become a conductor, free</title>
<style>
  /* ---- Design tokens: calm, high-contrast dark study tool ---- */
  :root{
    --bg:#0e1116; --surface:#161b22; --surface-2:#1c232c; --line:#2a3340;
    --ink:#e6edf3; --muted:#9aa7b4;
    --clear:#3fb950; --caution:#d29922; --stop:#f85149; --focus:#58a6ff;
    --r:14px; --maxw:920px; --fs:16px; --space:1.5;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-dys="1"]{ --font:"Atkinson Hyperlegible","Comic Sans MS",Verdana,sans-serif; --space:1.8; letter-spacing:.02em; word-spacing:.08em; }
  html[data-contrast="1"]{ --ink:#ffffff; --muted:#cdd9e5; --line:#3d4855; }

  *{ box-sizing:border-box }
  html,body{ margin:0 }
  body{ background:var(--bg); color:var(--ink); font-family:var(--font); font-size:var(--fs); line-height:var(--space); -webkit-font-smoothing:antialiased; }
  a{ color:var(--focus) }
  .wrap{ max-width:var(--maxw); margin:0 auto; padding:20px 18px 80px }
  .muted{ color:var(--muted) }
  :focus-visible{ outline:3px solid var(--focus); outline-offset:2px; border-radius:6px }
  .skip{ position:absolute; left:-999px; top:0; background:var(--clear); color:#062; padding:8px 12px; border-radius:0 0 8px 0; z-index:50 }
  .skip:focus{ left:0 }

  header.top{ display:flex; align-items:center; gap:14px; padding:6px 0 18px; border-bottom:1px solid var(--line); margin-bottom:22px }
  .mark{ width:42px; height:42px; border-radius:10px; background:var(--surface-2); border:1px solid var(--line); display:grid; place-items:center; flex:0 0 auto; cursor:pointer }
  .mark span{ width:14px; height:14px; border-radius:50%; background:var(--clear); box-shadow:0 0 12px var(--clear) }
  .brand h1{ font-size:1.35rem; margin:0; letter-spacing:.2px }
  .brand p{ margin:2px 0 0; color:var(--muted); font-size:.86rem }
  .top .grow{ flex:1 }
  .iconbtn{ background:var(--surface-2); color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:9px 13px; font:inherit; font-size:.9rem; cursor:pointer; min-height:44px }
  .iconbtn:hover{ border-color:var(--muted) }

  .lede{ background:linear-gradient(180deg,var(--surface),var(--surface) 60%,transparent); border:1px solid var(--line); border-radius:var(--r); padding:18px; margin-bottom:24px }
  .lede b{ color:var(--clear) }
  .free{ display:inline-block; font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--clear); border:1px solid var(--clear); border-radius:999px; padding:3px 10px; margin-bottom:10px }
  h2.section{ font-size:.78rem; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:28px 2px 12px }

  .path{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:18px }
  .stage{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap }
  .stage b{ font-size:1.05rem } .stage span{ color:var(--muted); font-size:.85rem }
  .bar{ height:12px; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; overflow:hidden; margin-top:12px }
  .bar > i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--clear),#6fd17f); transition:width .6s ease }
  html[data-reduce="1"] .bar > i{ transition:none }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:15px; display:flex; flex-direction:column; gap:8px }
  .card.locked{ opacity:.55 }
  .card .h{ display:flex; align-items:center; gap:9px }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--clear); flex:0 0 auto }
  .card h3{ margin:0; font-size:1rem } .card p{ margin:0; color:var(--muted); font-size:.84rem; flex:1 }
  .mini{ height:7px; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; overflow:hidden }
  .mini > i{ display:block; height:100%; width:0%; background:var(--clear) }
  .soon{ font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--caution); border:1px solid var(--caution); border-radius:999px; padding:2px 8px; align-self:flex-start }

  .stations{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px }
  .station{ background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:14px; text-align:left; color:var(--ink); font:inherit; cursor:pointer; min-height:64px }
  .station:hover{ border-color:var(--clear) } .station b{ display:block } .station small{ color:var(--muted) }
  .station[disabled]{ cursor:default; opacity:.5 } .station[disabled]:hover{ border-color:var(--line) }

  footer{ margin-top:40px; padding-top:18px; border-top:1px solid var(--line); color:var(--muted); font-size:.82rem }
  footer .tip{ display:inline-block; border:1px solid var(--caution); color:var(--caution); border-radius:999px; padding:4px 12px; margin-bottom:10px }

  /* ---- station views ---- */
  .back{ background:none; border:0; color:var(--focus); font:inherit; cursor:pointer; padding:6px 0; min-height:44px }
  .view-title{ font-size:1.3rem; margin:.2em 0 .1em }
  .search{ width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:12px 14px; font:inherit; margin:8px 0 16px }
  .ref-list{ display:flex; flex-direction:column; gap:8px }
  .ref-row{ text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:11px 13px; color:var(--ink); font:inherit; cursor:pointer }
  .ref-row:hover{ border-color:var(--clear) } .ref-row b{ display:block } .ref-row small{ color:var(--muted) }
  .ref-detail{ margin-top:16px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:16px 18px }
  .ref-detail h3{ margin:0 0 6px } .ref-detail .plain{ font-size:1.05rem }
  .badge{ display:inline-block; font-size:.72rem; border-radius:999px; padding:2px 9px; margin-bottom:8px }
  .badge.clear{ color:var(--clear); border:1px solid var(--clear) } .badge.caution{ color:var(--caution); border:1px solid var(--caution) }
  details{ margin:10px 0 } summary{ cursor:pointer; color:var(--focus) }
  blockquote{ margin:10px 0 0; padding:10px 14px; border-left:3px solid var(--line); background:var(--surface-2); border-radius:0 8px 8px 0; color:var(--ink) }
  .cite{ margin-top:10px; font-size:.8rem; color:var(--muted) }

  .drill-top{ display:flex; justify-content:space-between; margin:6px 0 }
  .prompt{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:18px; font-size:1.1rem; margin-bottom:14px }
  .opts{ display:flex; flex-direction:column; gap:10px }
  .opt{ text-align:left; background:var(--surface-2); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:13px 15px; font:inherit; cursor:pointer; min-height:48px }
  .opt:hover:not(:disabled){ border-color:var(--clear) }
  .opt.right{ border-color:var(--clear); background:rgba(63,185,80,.16) }
  .opt.wrong{ border-color:var(--stop); background:rgba(248,81,73,.14) }
  .feedback{ margin-top:16px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:14px 16px; display:flex; flex-direction:column; gap:8px }
  .fb-ok{ color:var(--clear) } .fb-no{ color:var(--stop) }
  .feedback .next{ align-self:flex-start; margin-top:6px }
  .big-score{ font-size:2.4rem; margin:.2em 0 }

  /* ---- settings ---- */
  dialog#settings{ background:var(--surface); color:var(--ink); border:1px solid var(--line); border-radius:var(--r); max-width:440px; width:92%; padding:0 }
  dialog#settings::backdrop{ background:rgba(0,0,0,.6) }
  .set-h{ display:flex; justify-content:space-between; align-items:center; padding:16px 18px; border-bottom:1px solid var(--line) }
  .set-h h2{ margin:0; font-size:1.05rem }
  .set-body{ padding:8px 18px 18px }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid var(--line) }
  .row:last-child{ border-bottom:0 } .row label{ font-size:.95rem } .row small{ display:block; color:var(--muted); font-size:.8rem }
  .sw{ position:relative; width:50px; height:28px; flex:0 0 auto }
  .sw input{ position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer }
  .sw i{ position:absolute; inset:0; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; transition:.2s }
  .sw i::after{ content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:var(--muted); transition:.2s }
  .sw input:checked + i{ background:rgba(63,185,80,.25); border-color:var(--clear) }
  .sw input:checked + i::after{ left:25px; background:var(--clear) }
  html[data-reduce="1"] .sw i, html[data-reduce="1"] .sw i::after{ transition:none }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important } }
</style>
</head>
<body>
<a class="skip" href="#view">Skip to content</a>
<div class="wrap">
  <header class="top">
    <button class="mark" aria-label="Home" onclick="location.hash=''"><span></span></button>
    <div class="brand">
      <h1>Clear Board</h1>
      <p>Become a conductor. Free, forever.</p>
    </div>
    <div class="grow"></div>
    <button class="iconbtn" id="openSet" aria-haspopup="dialog">⚙ Settings</button>
  </header>
  <main id="view" tabindex="-1"><!-- routed: home / reference / drill --></main>
</div>

<dialog id="settings" aria-label="Settings">
  <div class="set-h"><h2>Settings</h2><button class="iconbtn" id="closeSet">Done</button></div>
  <div class="set-body">
    <div class="row"><div><label for="t-dys">Dyslexia-friendly text</label><small>Clearer font + looser spacing</small></div><span class="sw"><input type="checkbox" id="t-dys"><i></i></span></div>
    <div class="row"><div><label for="t-con">Higher contrast</label><small>Brighter text on dark</small></div><span class="sw"><input type="checkbox" id="t-con"><i></i></span></div>
    <div class="row"><div><label for="t-red">Reduce motion</label><small>No animations</small></div><span class="sw"><input type="checkbox" id="t-red"><i></i></span></div>
    <div class="row"><div><label for="t-aud">Read aloud</label><small>Speak rules &amp; questions (where supported)</small></div><span class="sw"><input type="checkbox" id="t-aud"><i></i></span></div>
    <div class="row"><div><label for="t-big">Bigger text</label><small>Increase the type size</small></div><span class="sw"><input type="checkbox" id="t-big"><i></i></span></div>
  </div>
</dialog>

<script type="module" src="app.js"></script>
</body>
</html>
